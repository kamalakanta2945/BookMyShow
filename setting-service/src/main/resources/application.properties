# Server Configuration
server.port=8089

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow_settings?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Cache Configuration
spring.redis.host=localhost
spring.redis.port=6379

# Caching Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000 # 1 hour, as settings change infrequently

# Logging Configuration
logging.level.com.bookmyshow=INFO
logging.file.name=logs/setting-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
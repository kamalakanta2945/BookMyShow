# Server Configuration
server.port=8088

# MySQL Database Configuration
# This service connects to the main database (or a read replica) to generate reports.
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow_main?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logging Configuration
logging.level.com.bookmyshow=INFO
logging.file.name=logs/report-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
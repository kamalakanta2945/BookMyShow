spring.application.name=payment-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# It is strongly recommended to use environment variables for secrets.
# For example: razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_id=YOUR_RAZORPAY_KEY_ID
razorpay.key_secret=YOUR_RAZORPAY_KEY_SECRET

logging.level.org.springframework=INFO
logging.level.com.eventbook.paymentservice=DEBUG
logging.file.name=logs/payment-service.log
spring.application.name=theatre-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/theatre_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.org.springframework=INFO
logging.level.com.eventbook.theatreservice=DEBUG
logging.file.name=logs/theatre-service.log
spring.application.name=organizer-service
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/organizer_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:password} # It is recommended to use environment variables
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT Configuration
jwt.secret=${JWT_SECRET}

logging.level.org.springframework=INFO
logging.level.com.eventbook.organizerservice=DEBUG
logging.file.name=logs/organizer-service.log
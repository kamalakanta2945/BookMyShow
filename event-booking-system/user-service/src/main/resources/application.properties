spring.application.name=user-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# It is strongly recommended to use environment variables for secrets.
# For example: jwt.secret=${JWT_SECRET}
jwt.secret=PLEASE_REPLACE_WITH_THE_SAME_STRONG_SECRET_KEY_AS_IN_API_GATEWAY
jwt.expiration=86400000

logging.level.org.springframework=INFO
logging.level.com.eventbook.userservice=DEBUG
logging.file.name=logs/user-service.log
spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:password} # It is recommended to use environment variables
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# It is strongly recommended to use environment variables for secrets.
# For example: jwt.secret=${JWT_SECRET}
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

logging.level.org.springframework=INFO
logging.level.com.eventbook.authservice=DEBUG
logging.file.name=logs/auth-service.log
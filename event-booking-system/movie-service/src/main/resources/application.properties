spring.application.name=movie-service
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/movie_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:password} # It is recommended to use environment variables
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password= # Uncomment and set if your Redis has a password

logging.level.org.springframework=INFO
logging.level.com.eventbook.movieservice=DEBUG
logging.file.name=logs/movie-service.log